<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Logseq Plugin Entrypoint</title>
        <style>
            .loader {
                width: 20px;
                height: 20px;
                border: 3px solid #d1d5db;
                border-top-color: #3498db;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            #spinner {
                display: none;
                float: left;
                margin-top: 15px;
                margin-left: 10px;
            }

            #backdrop {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.2);
                z-index: 9999;
                display: none;
                align-items: flex-start;
                justify-content: center;
                padding-top: 14px;
                box-sizing: border-box;
            }

            #prompt-panel {
                width: min(560px, calc(100% - 20px));
                background: linear-gradient(135deg, #f8fafc, #eef2ff);
                border: 1px solid #dbeafe;
                border-radius: 12px;
                box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
                padding: 10px;
            }

            #prompt-input {
                width: 100%;
                height: 34px;
                border: 2px solid #3498db;
                border-radius: 8px;
                padding: 0 10px;
                font-size: 14px;
                color: #0f172a;
                outline: none;
                box-sizing: border-box;
                background: #ffffff;
            }

            #prompt-input:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            }

            #prompt-hint {
                margin-top: 8px;
                font-size: 12px;
                color: #475569;
            }

            .awesomplete {
                width: 100%;
            }

            .awesomplete > ul {
                border-radius: 10px;
                border: 1px solid #cbd5e1;
                box-shadow: 0 14px 26px rgba(15, 23, 42, 0.16);
                max-height: 180px;
                overflow: auto;
            }

            .awesomplete > ul > li {
                padding: 7px 10px;
            }

            #prompt-panel > h4 {
                font-family: Arial, Helvetica, sans-serif;
                color: #8a8d8a;
                font-weight: normal;
                float: left;
            }

        </style>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/awesomplete@1.1.7/awesomplete.min.css" />
    </head>
    <body>
        <div id="backdrop">
            <div id="prompt-panel" role="dialog" aria-label="LLM prompt">
                <input id="prompt-input" type="text" placeholder="Ask your model... try /sum or /action" autocomplete="off" />
                <div id="prompt-hint">Agent mode enabled. (Ctrl+Shift+L to toggle)</div>
                <h4 id="llm-info"></h4>
                <span id="spinner" style="width: 30px; height: 30px;">
                    <div class="loader" aria-label="Loading" role="status"></div>
                </span>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/awesomplete@1.1.7/awesomplete.min.js"></script>
        <script src="./index.ts" type="module"></script>
    </body>
</html>
